bridge:
  sensor_bind: "tcp://*:5566"
  command_bind: "tcp://*:5567"
  control_bind: "tcp://*:5569"
  policy_endpoint: "tcp://127.0.0.1:5565"
  policy_control_endpoint: "tcp://127.0.0.1:5568"
  policy_type: "act"
  control_rate_hz: 10.0
  policy_request_timeout_ms: 300
  signature_backend: "auto"
  signature_depth: 3
  max_skew_ms: 150
  left_arm_dim: 7
  right_arm_dim: 7
  enable_base_action: true
  initial_episode_id: "compare-act-episode-0000"
  initial_mode: "auto"
  state_streams:
    base: "odom"
    left_arm: "left_arm_joint_state"
    right_arm: "right_arm_joint_state"
  image_streams:
    observation.images.realsense_top: "realsense_top"
    observation.images.realsense_left: "realsense_left"
    observation.images.realsense_right: "realsense_right"
  freshness_ms:
    odom: 100
    left_arm_joint_state: 100
    right_arm_joint_state: 100
    realsense_top: 300
    realsense_left: 300
    realsense_right: 300

ros1:
  node_name: "policy_bridge_ros1_adapter_compare_act"
  sensor_endpoint: "tcp://127.0.0.1:5566"
  command_endpoint: "tcp://127.0.0.1:5567"
  command_poll_hz: 100.0
  outgoing_queue_size: 256
  publish_zero_base_on_hold: true
  image_topics:
    - stream: "realsense_top"
      topic: "/realsense_top/color/image_raw/compressed"
      compressed: true
    - stream: "realsense_left"
      topic: "/realsense_left/color/image_raw/compressed"
      compressed: true
    - stream: "realsense_right"
      topic: "/realsense_right/color/image_raw/compressed"
      compressed: true
  left_arm_state_topic:
    stream: "left_arm_joint_state"
    topic: "/robot/arm_left/joint_states_single"
    joint_names:
      - "joint1"
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"
      - "joint6"
      - "gripper"
  right_arm_state_topic:
    stream: "right_arm_joint_state"
    topic: "/robot/arm_right/joint_states_single"
    joint_names:
      - "joint1"
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"
      - "joint6"
      - "gripper"
  odom_topic:
    stream: "odom"
    topic: "/ranger_base_node/odom"
  left_arm_command:
    topic: "/compare/act/left_arm_joint_states"
    joint_names:
      - "joint1"
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"
      - "joint6"
      - "gripper"
  right_arm_command:
    topic: "/compare/act/right_arm_joint_states"
    joint_names:
      - "joint1"
      - "joint2"
      - "joint3"
      - "joint4"
      - "joint5"
      - "joint6"
      - "gripper"
  base_command:
    topic: "/compare/act/cmd_vel"
    enabled: true
