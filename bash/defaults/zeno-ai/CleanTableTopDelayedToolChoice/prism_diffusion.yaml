train:
  dataset_root: "data/zeno-ai/wholebody_hanger_stage3_v30"
  dataset_repo_id: "zeno-ai/wholebody_hanger_stage3_v30"
  output_root: "outputs/train/zeno-ai/wholebody_hanger_stage3_v30/prism-diffusion"
  resume: false
  job_name: "prism-diffusion"
  wandb_project: "wholebody_hanger_stage3_v30"
  wandb_mode: "online"
  device: "cuda"
  use_amp: true
  amp_dtype: "auto"
  steps: 50000
  batch_size: 8
  num_workers: 24
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  video_backend: "torchcodec"
  torch_sharing_strategy: "file_system"
  torchcodec_decoder_cache_size: 32
  enable_filtered_hf_cache: true
  seed: 42
  log_freq: 100
  save_freq: 5000
  eval_freq: -1
  test_ratio: 0
  split_seed: 42
  split_shuffle: true
  n_obs_steps: 2
  horizon: 104
  n_action_steps: 100
  drop_n_last_frames: 3
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: false
  use_delta_signature: false
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 512
  signature_dropout: 0.1
  use_prefix_sequence_training: false
  prefix_train_max_steps: 32
  prefix_frame_stride: 1
  prefix_pad_value: 0.0
  use_visual_prefix_memory: false
  use_signature_indexed_slot_memory: false
  slot_memory_num_slots: 4
  slot_memory_routing_hidden_dim: 512
  slot_memory_use_delta_routing: false
  slot_memory_use_softmax_routing: true
  slot_memory_use_readout_pooling: true
  slot_memory_balance_loss_coef: 0.0
  slot_memory_consistency_loss_coef: 0.0
  prism_adapter_hidden_dim: 512
  prism_adapter_zero_init: true

eval:
  train_output_root: "outputs/train/zeno-ai/wholebody_hanger_stage3_v30/prism-diffusion"
  output_dir: "outputs/eval/zeno-ai/wholebody_hanger_stage3_v30/prism-diffusion/{run_tag}"
  eval_split: "test"
  test_ratio: 0
  split_seed: 42
  split_shuffle: true
  max_episodes: 20
  max_steps_per_episode: null
  seed: 42
  device: "cuda"
  n_action_steps: 50
