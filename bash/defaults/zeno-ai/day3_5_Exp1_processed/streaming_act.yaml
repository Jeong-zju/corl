train:
  dataset_root: "data/zeno-ai/day3_5_Exp1_processed"
  dataset_repo_id: "zeno-ai/day3_5_Exp1_processed"
  output_root: "outputs/train/zeno-ai/day3_5_Exp1_processed/streaming-act-sipm"
  resume: false
  job_name: "streaming-act-sipm"
  wandb_project: "day3_5_Exp1_processed"
  wandb_mode: "online"
  device: "cuda"
  use_amp: true
  amp_dtype: "auto"
  distributed:
    enabled: false
    launcher: "accelerate"
    num_processes: 1
    gpu_ids: "all"
    num_machines: 1
    machine_rank: 0
    main_process_ip: null
    main_process_port: null
  steps: 50000
  batch_size: 8
  num_workers: 24
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  video_backend: "torchcodec"
  torch_sharing_strategy: "file_system"
  torchcodec_decoder_cache_size: 32
  enable_filtered_hf_cache: true
  seed: 42
  log_freq: 50
  save_freq: 5000
  eval_freq: -1
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  chunk_size: 100
  n_action_steps: 100
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: true
  use_delta_signature: true
  use_prefix_sequence_training: true
  prefix_train_max_steps: 16
  prefix_frame_stride: 5
  prefix_pad_value: 0.0
  use_visual_prefix_memory: true
  use_signature_conditioned_visual_prefix_memory: true
  use_memory_conditioned_encoder_film: true
  num_memory_slots: 1
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 512
  signature_dropout: 0.1

eval:
  train_output_root: "outputs/train/zeno-ai/day3_5_Exp1_processed/streaming-act-sipm"
  output_dir: "outputs/eval/zeno-ai/day3_5_Exp1_processed/streaming-act-sipm/{run_tag}"
  eval_split: "test"
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  max_episodes: 20
  max_steps_per_episode: null
  seed: 42
  device: "cuda"
  n_action_steps: 1
  signature_backend: "auto"
