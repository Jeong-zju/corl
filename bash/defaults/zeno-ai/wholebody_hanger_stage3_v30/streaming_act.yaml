train:
  dataset_root: "data/zeno-ai/wholebody_hanger_stage3_v30"
  dataset_repo_id: "zeno-ai/wholebody_hanger_stage3_v30"
  output_root: "outputs/train/zeno-ai/wholebody_hanger_stage3_v30/streaming-act-no-vismem"
  job_name: "streaming-act-no-vismem"
  wandb_project: "wholebody_hanger_stage3_v30"
  wandb_mode: "online"
  device: "cuda"
  use_amp: true
  amp_dtype: "auto"
  steps: 200000
  batch_size: 32
  num_workers: 8
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  video_backend: "torchcodec"
  torch_sharing_strategy: "file_system"
  torchcodec_decoder_cache_size: 32
  enable_filtered_hf_cache: true
  filtered_hf_cache_root: ".cache/hf_datasets"
  refresh_filtered_hf_cache: false
  seed: 42
  log_freq: 2000
  save_freq: 50000
  eval_freq: -1
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  chunk_size: 100
  n_action_steps: 100
  use_first_frame_anchor: false
  use_imagenet_stats: false
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: true
  use_delta_signature: true
  use_prefix_sequence_training: true
  prefix_train_max_steps: 16
  prefix_frame_stride: 5
  prefix_pad_value: 0.0
  use_visual_prefix_memory: false
  use_signature_conditioned_visual_prefix_memory: false
  use_signature_indexed_slot_memory: false
  use_memory_conditioned_encoder_film: false
  num_memory_slots: 1
  slot_memory_num_slots: 4
  slot_memory_routing_hidden_dim: 512
  slot_memory_use_delta_routing: true
  slot_memory_use_softmax_routing: true
  slot_memory_use_readout_pooling: true
  slot_memory_balance_loss_coef: 0.0
  slot_memory_consistency_loss_coef: 0.0
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 512
  signature_dropout: 0.1

eval:
  train_output_root: "outputs/train/zeno-ai/wholebody_hanger_stage3_v30/streaming-act-no-vismem"
  output_dir: "outputs/eval/zeno-ai/wholebody_hanger_stage3_v30/streaming-act-no-vismem/{run_tag}"
  eval_split: "test"
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  max_episodes: 20
  max_steps_per_episode: null
  seed: 42
  device: "cuda"
  n_action_steps: 1
  signature_backend: "auto"
