train:
  dataset_root: "data/robocasa/composite"
  dataset_repo_id: "robocasa/composite"
  output_root: "outputs/train/robocasa/composite/act"
  job_name: "act"
  wandb_project: "robocasa-composite"
  wandb_mode: "online"
  device: "cuda"
  use_amp: true
  amp_dtype: "auto"
  steps: 100000
  batch_size: 32
  num_workers: 24
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  video_backend: "torchcodec"
  torch_sharing_strategy: "file_system"
  torchcodec_decoder_cache_size: 32
  enable_filtered_hf_cache: true
  seed: 42
  log_freq: 200
  save_freq: 10000
  eval_freq: -1
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  chunk_size: 100
  n_action_steps: 100
  use_first_frame_anchor: false
  use_imagenet_stats: false
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10

eval:
  train_output_root: "outputs/train/robocasa/composite/act"
  output_dir: "outputs/eval/robocasa/composite/act/{run_tag}"
  eval_split: "test"
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  max_episodes: 20
  max_steps_per_episode: null
  seed: 42
  device: "cuda"
  n_action_steps: 1
  robocasa_conda_env: "robocasa"
  num_rollouts: 20
  max_steps: null
  fps: 20
  max_episodes_rendered: 4
