# Single-task defaults for RoboCasa composite/ArrangeBreadBasket.
train:
  dataset_root: "data/robocasa/composite/ArrangeBreadBasket"
  dataset_repo_id: "robocasa/composite/ArrangeBreadBasket"
  output_root: "outputs/train/robocasa/composite/ArrangeBreadBasket/act"
  resume: false
  job_name: "act"
  wandb_project: "robocasa-composite-arrangebreadbasket"
  wandb_mode: "online"
  device: "cuda"
  use_amp: true
  amp_dtype: "auto"
  distributed:
    enabled: false
    launcher: "accelerate"
    num_processes: 1
    gpu_ids: "all"
    num_machines: 1
    machine_rank: 0
    main_process_ip: null
    main_process_port: null
  steps: 200000
  batch_size: 32
  num_workers: 24
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  video_backend: "torchcodec"
  torch_sharing_strategy: "file_system"
  torchcodec_decoder_cache_size: 32
  seed: 42
  log_freq: 2000
  save_freq: 50000
  eval_freq: -1
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  chunk_size: 100
  n_action_steps: 100
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10

eval:
  train_output_root: "outputs/train/robocasa/composite/ArrangeBreadBasket/act"
  output_dir: "outputs/eval/robocasa/composite/ArrangeBreadBasket/act/{run_tag}"
  task: "ArrangeBreadBasket"
  eval_split: "test"
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  max_episodes: 20
  max_steps_per_episode: null
  seed: 42
  device: "cuda"
  n_action_steps: 50
  robocasa_conda_env: "robocasa"
  robocasa_split: "target"
  num_rollouts: 20
  max_steps: null
  fps: 20
  max_episodes_rendered: 4
