# Single-task defaults for RoboCasa composite/PackFoodByTemp.
train:
  dataset_root: "data/robocasa/composite/PackFoodByTemp"
  dataset_repo_id: "robocasa/composite/PackFoodByTemp"
  output_root: "outputs/train/robocasa/composite/PackFoodByTemp/streaming-act-prism"
  resume: false
  job_name: "streaming-act-prism"
  wandb_project: "robocasa-composite-packfoodbytemp"
  wandb_mode: "online"
  device: "cuda"
  use_amp: true
  amp_dtype: "auto"
  distributed:
    enabled: false
    launcher: "accelerate"
    num_processes: 1
    gpu_ids: "all"
    num_machines: 1
    machine_rank: 0
    main_process_ip: null
    main_process_port: null
  # PackFoodByTemp is one of the longest and densest memory-heavy composite tasks
  # in RoboCasa: ~123s mean episode length (~2460 frames at 20 FPS) and 15 subtasks.
  # Give it a slightly longer training schedule, but trim batch size because the
  # larger prefix budget and wider routing MLP noticeably increase memory use.
  steps: 240000
  batch_size: 12
  num_workers: 16
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  video_backend: "torchcodec"
  torch_sharing_strategy: "file_system"
  torchcodec_decoder_cache_size: 32
  seed: 42
  log_freq: 2000
  save_freq: 50000
  eval_freq: -1
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  chunk_size: 100
  n_action_steps: 100
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: true
  use_delta_signature: true
  use_prefix_sequence_training: true
  # Keep one anchor frame plus a recent tail spanning about 15 seconds
  # (~308 frames) so the memory module can reconstruct the latest source-to-
  # destination routing state without exploding prefix compute.
  prefix_train_max_steps: 24
  prefix_frame_stride: 14
  prefix_pad_value: 0.0
  use_visual_prefix_memory: true
  use_signature_conditioned_visual_prefix_memory: false
  use_signature_indexed_slot_memory: true
  use_memory_conditioned_encoder_film: true
  num_memory_slots: 1
  # Six slots work well with the task structure: hot / cold grouping, two
  # destination containers, and remaining source-context spillover.
  slot_memory_num_slots: 6
  slot_memory_routing_hidden_dim: 768
  slot_memory_use_delta_routing: true
  slot_memory_use_softmax_routing: true
  slot_memory_use_readout_pooling: true
  # Small auxiliary losses help avoid slot collapse without dominating the ACT loss.
  slot_memory_balance_loss_coef: 0.02
  slot_memory_consistency_loss_coef: 0.01
  # Let training auto-resolve the full episode horizon for signatures from the
  # dataset metadata so the routing signal always sees the task's true scale.
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 768
  signature_dropout: 0.05
  signature_cache_mode: "ram"
  signature_cache_dtype: "float16"
  prefix_image_cache_mode: "off"
  prefix_image_cache_dtype: "uint8"

eval:
  train_output_root: "outputs/train/robocasa/composite/PackFoodByTemp/streaming-act-prism"
  output_dir: "outputs/eval/robocasa/composite/PackFoodByTemp/streaming-act-prism/{run_tag}"
  task: "PackFoodByTemp"
  eval_split: "test"
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  max_episodes: 20
  max_steps_per_episode: null
  seed: 42
  device: "cuda"
  n_action_steps: 100
  temporal_ensemble_coeff: 0
  signature_backend: "auto"
  robocasa_conda_env: "robocasa"
  robocasa_split: "target"
  num_rollouts: 20
  max_steps: null
  fps: 20
  max_episodes_rendered: 4
