train:
  dataset_root: "data/zeno-ai/panda_route_onebit_cue_v30"
  dataset_repo_id: "zeno-ai/panda_route_onebit_cue_v30"
  output_root: "outputs/train/panda_route/streaming-act"
  resume: false
  job_name: "streaming-act"
  wandb_project: "panda_route"
  wandb_mode: "online"
  device: "cuda"
  distributed:
    enabled: false
    launcher: "accelerate"
    num_processes: 1
    gpu_ids: "all"
    num_machines: 1
    machine_rank: 0
    main_process_ip: null
    main_process_port: null
  steps: 50000
  batch_size: 32
  num_workers: 4
  seed: 42
  log_freq: 50
  save_freq: 10000
  eval_freq: -1
  chunk_size: 5
  n_action_steps: 5
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: true
  use_prefix_sequence_training: false
  prefix_train_max_steps: 32
  prefix_frame_stride: 1
  prefix_pad_value: 0.0
  use_visual_prefix_memory: false
  num_memory_slots: 1
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 512
  signature_dropout: 0.1

eval:
  train_output_root: "outputs/train/panda_route/streaming-act"
  output_dir: "outputs/eval/panda_route/streaming-act/{run_tag}"
  num_rollouts: 50
  max_steps: 500
  fps: 20
  seed: 42
  device: "cuda"
  n_action_steps: 5
  temporal_ensemble_coeff: 0
  max_action_step: 0.02
  enable_randomize: false
  signature_backend: "auto"
