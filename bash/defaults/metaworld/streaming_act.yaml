train:
  dataset_root: "data/lerobot_metaworld_mt50_video_sipm"
  dataset_repo_id: "metaworld_mt50"
  task: "assembly-v3,dial-turn-v3,handle-press-side-v3"
  output_root: "outputs/train/metaworld_mt50/streaming-act-sipm"
  job_name: "streaming-act-sipm"
  wandb_project: "metaworld_mt50"
  wandb_mode: "online"
  device: "cuda"
  use_amp: true
  amp_dtype: "auto"
  steps: 100000
  batch_size: 8
  num_workers: 8
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  torch_sharing_strategy: "file_system"
  torchcodec_decoder_cache_size: 32
  enable_filtered_hf_cache: true
  filtered_hf_cache_root: ".cache/hf_datasets"
  refresh_filtered_hf_cache: false
  test_ratio: 0.2
  split_seed: 42
  split_shuffle: true
  seed: 42
  log_freq: 50
  save_freq: 5000
  eval_freq: -1
  chunk_size: 100
  n_action_steps: 100
  use_imagenet_stats: false
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: true
  use_delta_signature: true
  use_prefix_sequence_training: true
  prefix_train_max_steps: 32
  prefix_frame_stride: 1
  prefix_pad_value: 0.0
  use_visual_prefix_memory: true
  use_signature_conditioned_visual_prefix_memory: true
  use_memory_conditioned_encoder_film: true
  num_memory_slots: 1
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 512
  signature_dropout: 0.1

eval:
  train_output_root: "outputs/train/metaworld_mt50/streaming-act-sipm"
  output_dir: "outputs/eval/metaworld_mt50/streaming-act-sipm/{run_tag}"
  task: "assembly-v3,dial-turn-v3,handle-press-side-v3"
  num_rollouts: 50
  max_steps: 400
  max_episodes_rendered: 50
  fps: 80
  seed: 42
  device: "cuda"
  n_action_steps: 1
  signature_backend: "auto"
