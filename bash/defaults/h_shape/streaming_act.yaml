train:
  dataset_root: "data/zeno-ai/rrt_connect_h_v30"
  dataset_repo_id: "zeno-ai/rrt_connect_h_v30"
  output_root: "outputs/train/h_shape/streaming-act"
  resume: false
  job_name: "streaming-act"
  wandb_project: "h_shape"
  wandb_mode: "online"
  device: "cuda"
  steps: 10000
  batch_size: 32
  num_workers: 4
  seed: 42
  log_freq: 50
  save_freq: 1000
  eval_freq: -1
  chunk_size: 5
  n_action_steps: 1
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: true
  use_prefix_sequence_training: false
  prefix_train_max_steps: 32
  prefix_frame_stride: 1
  prefix_pad_value: 0.0
  use_visual_prefix_memory: false
  num_memory_slots: 1
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 512
  signature_dropout: 0.1

eval:
  train_output_root: "outputs/train/h_shape/streaming-act"
  output_dir: "outputs/eval/h_shape/streaming-act/{run_tag}"
  num_rollouts: 20
  max_steps: 120
  fps: 20
  seed: 42
  device: "cuda"
  n_action_steps: null
  success_threshold: 0.2
  max_action_step: 0.3
  enable_randomize: false
  signature_backend: "auto"
