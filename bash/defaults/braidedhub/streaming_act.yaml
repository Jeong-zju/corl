train:
  dataset_root: "data/zeno-ai/braidedhub_fourstart_implicit_cue_v30"
  dataset_repo_id: "zeno-ai/braidedhub_fourstart_implicit_cue_v30"
  output_root: "outputs/train/braidedhub/streaming-act-sipm"
  job_name: "streaming-act-sipm"
  wandb_project: "braidedhub"
  wandb_mode: "online"
  device: "cuda"
  steps: 50000
  batch_size: 32
  num_workers: 4
  seed: 42
  log_freq: 50
  save_freq: 10000
  eval_freq: -1
  chunk_size: 50
  n_action_steps: 50
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10
  use_path_signature: true
  use_delta_signature: true
  use_prefix_sequence_training: true
  prefix_train_max_steps: 16
  prefix_frame_stride: 5
  prefix_pad_value: 0.0
  use_visual_prefix_memory: true
  use_signature_conditioned_visual_prefix_memory: true
  use_memory_conditioned_encoder_film: true
  num_memory_slots: 1
  history_length: 0
  signature_dim: 0
  signature_depth: 3
  signature_hidden_dim: 512
  signature_dropout: 0.1

eval:
  train_output_root: "outputs/train/braidedhub/streaming-act-sipm"
  output_dir: "outputs/eval/braidedhub/streaming-act-sipm/{run_tag}"
  num_rollouts: 50
  max_steps: 240
  fps: 20
  seed: 42
  device: "cuda"
  n_action_steps: 5
  max_action_step: 2.5
  collision_mode: "detect"
  enable_randomize: true
  signature_backend: "auto"
