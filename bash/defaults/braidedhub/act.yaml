train:
  dataset_root: "data/zeno-ai/braidedhub_fourstart_implicit_cue_v30"
  dataset_repo_id: "zeno-ai/braidedhub_fourstart_implicit_cue_v30"
  output_root: "outputs/train/braidedhub_fourstart_act"
  job_name: "act_braidedhub_fourstart"
  wandb_project: "lerobot-braidedhub"
  wandb_mode: "online"
  device: "cuda"
  steps: 50000
  batch_size: 32
  num_workers: 4
  seed: 42
  log_freq: 50
  save_freq: 10000
  eval_freq: -1
  chunk_size: 5
  n_action_steps: 5
  use_first_frame_anchor: true
  use_imagenet_stats: false
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10

eval:
  train_output_root: "outputs/train/braidedhub_fourstart_act"
  output_dir: "outputs/eval/braidedhub_fourstart_act/{run_tag}"
  num_rollouts: 50
  max_steps: 240
  fps: 20
  seed: 42
  device: "cuda"
  n_action_steps: 5
  max_action_step: 2.5
  collision_mode: "detect"
  enable_randomize: true
