train:
  dataset_root: "data/zeno-ai/braidedhub_fourstart_implicit_cue_v30"
  dataset_repo_id: "zeno-ai/braidedhub_fourstart_implicit_cue_v30"
  output_root: "outputs/train/braidedhub/act-baseline"
  resume: false
  job_name: "act-baseline"
  wandb_project: "braidedhub"
  wandb_mode: "online"
  device: "cuda"
  distributed:
    enabled: false
    launcher: "accelerate"
    num_processes: 1
    gpu_ids: "all"
    num_machines: 1
    machine_rank: 0
    main_process_ip: null
    main_process_port: null
  steps: 50000
  batch_size: 32
  num_workers: 4
  seed: 42
  log_freq: 50
  save_freq: 10000
  eval_freq: -1
  chunk_size: 50
  n_action_steps: 50
  enable_wandb: true
  wandb_console: "off"
  wandb_service_wait: 10

eval:
  train_output_root: "outputs/train/braidedhub/act-baseline"
  output_dir: "outputs/eval/braidedhub/act-baseline/{run_tag}"
  num_rollouts: 50
  max_steps: 240
  fps: 20
  seed: 42
  device: "cuda"
  n_action_steps: 5
  max_action_step: 2.5
  collision_mode: "detect"
  enable_randomize: true
